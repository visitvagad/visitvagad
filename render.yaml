services:
  - type: web
    name: visit-vagad-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      # ⚠️ CRITICAL: Set CORS_ORIGIN to your Vercel frontend URL
      # Example: https://visitvagad.vercel.app
      - key: CORS_ORIGIN
        scope: all
      
      # MongoDB Atlas connection string
      - key: MONGO_URI
        scope: all
      
      # JWT authentication (generate with: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))")
      - key: JWT_SECRET
        scope: all
      
      # JWT expiration time
      - key: JWT_EXPIRES_IN
        value: 7d
      
      # ImageKit credentials for image uploads
      - key: IMAGEKIT_PUBLIC_KEY
        scope: all
      
      - key: IMAGEKIT_PRIVATE_KEY
        scope: all
      
      - key: IMAGEKIT_URL_ENDPOINT
        scope: all
      
      # Server configuration
      - key: PORT
        value: 5000
      
      - key: NODE_ENV
        value: production
